<!DOCTYPE html>

<title>Sprawdzenie danych Sirocki </title>    
<meta charset="utf-8">   
</head>  
<body> 
<div style="color:red;font-size:50px;"> 
<script language="JavaScript"> 
do { 
var liczba1=prompt("wysokość =",""); 
var h_sir=parseFloat(liczba1); 
} 
while ( h_sir<=0); 
do { 
var liczba1=prompt("podstawę =",""); 
var a_sir=parseFloat(liczba1); 
} 
while(!( a_sir>0)); 
var Pole=a_sir*h_sir/2; 
document.write("Pole="+Pole.toFixed(2)+" cm^2"+"<br>"); 
</script>
