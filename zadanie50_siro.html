<html>
    <body>
        <div style="color:red;font-size:50px;">
            <script language="JavaScript">
                suma_sir=0;
                for(i_s=1;i_s<=1000000;i_s++)
            {
                suma_sir=suma_sir+1/i_s;
            }
            document.write("suma = "+ suma_sir.toFixed(2)+"<br>");
            </script>
        </div>
    </body>
</html>
