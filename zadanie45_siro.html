<title>Sirocki Z45_JS</title>
<meta charset="utf-8">
</head>
<body> 
<div style="color:red;font-size:50px;"> 
<script> 
var koniec_petli_sir = prompt("Podaj koniec pętli:", "");
koniec_petli_sir = parseInt(koniec_petli_sir);

for (var i_sir = 2; i_sir <= koniec_petli_sir; i_sir += 2)
{
    document.write("Liczba " + i_sir + "<br>");
}
</script> 
</div> 
</body> 
</html>
